name: Update GitBook OpenAPI specs
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Update OpenAPI specs and sync to GitBook
        env:
          GITBOOK_TOKEN: ${{ secrets.GITBOOK_TOKEN }}
          GITBOOK_ORG_ID: ${{ secrets.GITBOOK_ORG_ID }}
        run: deno run -A docs/.scripts/updateOpenAPI.ts

      - name: Open pull request with SUMMARY.md changes
        uses: peter-evans/create-pull-request@v8
        with:
          base: main
          branch: docs/update-summary
          delete-branch: true
          add-paths: docs/SUMMARY.md
          commit-message: "docs: update SUMMARY.md"
          title: "docs: update SUMMARY.md"
          body: "Automated `docs/SUMMARY.md` update generated by the OpenAPI sync workflow."
